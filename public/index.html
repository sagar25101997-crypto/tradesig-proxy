<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Trade Signals | Live Alerts & Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@400;600&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060a0f; --bg2:#0b1118; --bg3:#0f1820;
  --border:#162030; --border2:#1e3048;
  --green:#00ff88; --green-dim:rgba(0,255,136,0.08);
  --red:#ff3355; --red-dim:rgba(255,51,85,0.08);
  --gold:#ffc442; --accent:#00d4ff; --accent-dim:rgba(0,212,255,0.08);
  --text:#b8cfe0; --text2:#6a8aa8; --text3:#3a5570; --white:#e8f4ff;
  --mono:'IBM Plex Mono',monospace; --display:'Orbitron',monospace; --ui:'Exo 2',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--ui);display:flex;flex-direction:column;height:100dvh;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:9999;}

.header{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.header-logo{font-family:var(--display);font-size:15px;font-weight:900;color:var(--green);letter-spacing:3px;text-shadow:0 0 20px rgba(0,255,136,0.4);flex:1;}
.header-logo span{color:var(--accent);}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.2);border-radius:20px;padding:4px 10px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.live-text{font-family:var(--mono);font-size:9px;color:var(--green);letter-spacing:2px;}
.sound-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
.sound-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(255,196,66,0.08);}
.settings-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

.refresh-bar{height:2px;background:var(--border);flex-shrink:0;overflow:hidden;}
.refresh-progress{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));width:100%;transform-origin:left;animation:shrink 30s linear infinite;}
@keyframes shrink{from{transform:scaleX(1)}to{transform:scaleX(0)}}

.tabs{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.tab.active{border-bottom-color:var(--green);}
.tab.active .tab-name{color:var(--green);}
.tab.active .tab-count{background:var(--green);color:#000;}
.tab-name{font-family:var(--mono);font-size:8px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;transition:color 0.2s;}
.tab-count{font-family:var(--display);font-size:10px;font-weight:700;background:var(--bg3);color:var(--text2);border-radius:10px;padding:1px 7px;min-width:20px;text-align:center;transition:all 0.2s;}
#tab0 .tab-name{color:var(--gold);}
#tab0.active{border-bottom-color:var(--gold);}
#tab0.active .tab-name{color:var(--gold);}
#tab0.active .tab-count{background:var(--gold);color:#000;}
.live-pulse{width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 5px var(--gold);animation:blink 1s infinite;display:inline-block;margin-right:3px;}

.content{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;padding:10px;display:none;-webkit-overflow-scrolling:touch;}
.page.active{display:block;}
.page::-webkit-scrollbar{width:3px;}
.page::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;}
.stat-n{font-family:var(--display);font-size:20px;font-weight:700;line-height:1;color:var(--accent);}
.stat-n.green{color:var(--green);}
.stat-n.red{color:var(--red);}
.stat-l{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1.5px;margin-top:3px;text-transform:uppercase;}

.sig-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s;position:relative;animation:cardIn 0.25s ease;}
@keyframes cardIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.sig-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px;z-index:1;}
.sig-card.buy::before{background:var(--green);}
.sig-card.sell::before{background:var(--red);}
.sig-card.buy{box-shadow:0 0 12px rgba(0,255,136,0.04);}
.sig-card.sell{box-shadow:0 0 12px rgba(255,51,85,0.04);}
.sig-card.new-signal.buy{border-color:rgba(0,255,136,0.35);box-shadow:0 0 20px rgba(0,255,136,0.13);}
.sig-card.new-signal.sell{border-color:rgba(255,51,85,0.35);box-shadow:0 0 20px rgba(255,51,85,0.13);}

.card-collapsed{padding:10px 12px 10px 16px;}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.card-dir-pair{display:flex;align-items:center;gap:6px;}
.card-emoji{font-size:16px;line-height:1;}
.card-dir{font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:2px;}
.card-dir.buy{color:var(--green);}
.card-dir.sell{color:var(--red);}
.card-pair{font-family:var(--display);font-size:15px;font-weight:900;color:var(--white);letter-spacing:1px;}
.card-right{display:flex;align-items:center;gap:5px;}
.new-pill{font-family:var(--mono);font-size:8px;color:#000;background:var(--green);padding:2px 7px;border-radius:10px;letter-spacing:1px;animation:blink 1s infinite;}
.ch-badge{font-family:var(--mono);font-size:8px;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);padding:2px 7px;border-radius:8px;letter-spacing:1px;}
.hit-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 9px;border-radius:8px;letter-spacing:1px;}
.hit-badge.open{background:rgba(255,196,66,0.1);color:var(--gold);border:1px solid rgba(255,196,66,0.25);}
.expand-arrow{font-size:11px;color:var(--text3);transition:transform 0.25s;margin-left:2px;}
.sig-card.expanded .expand-arrow{transform:rotate(180deg);}

.card-price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:9px;}
.cpg-cell{text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 4px;}
.cpg-label{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;margin-bottom:3px;}
.cpg-val{font-family:var(--mono);font-size:12px;font-weight:600;}
.cpg-val.entry{color:var(--accent);}
.cpg-val.sl{color:var(--red);}
.cpg-val.tp{color:var(--green);}
.cpg-val.rr{color:var(--gold);}

.card-time-row{display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:1px solid var(--border);}
.card-time-txt{font-family:var(--mono);font-size:9px;color:var(--text3);}
.card-tap-hint{font-family:var(--mono);font-size:8px;color:var(--text3);opacity:0.4;letter-spacing:1px;}

.card-expanded-body{display:none;border-top:1px solid var(--border2);}
@keyframes expandIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.sig-card.expanded .card-expanded-body{display:block;animation:expandIn 0.2s ease;}

.tg-body{padding:8px 14px;}
.tg-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(22,32,48,0.7);}
.tg-row:last-child{border-bottom:none;}
.tg-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1.5px;min-width:70px;}
.tg-val{font-family:var(--mono);font-size:12px;font-weight:600;}
.tg-val.entry{color:var(--accent);}
.tg-val.sl{color:var(--red);}
.tg-val.tp{color:var(--green);}
.tg-val.rr{color:var(--gold);}
.tg-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--bg3);border-top:1px solid var(--border);}
.tg-time{font-family:var(--mono);font-size:9px;color:var(--text3);}
.rr-pill{font-family:var(--mono);font-size:9px;color:var(--gold);background:rgba(255,196,66,0.08);border:1px solid rgba(255,196,66,0.2);padding:3px 10px;border-radius:10px;}

.raw-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.raw-text{font-family:var(--mono);font-size:11px;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.raw-time{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:6px;}

.hist-stats-header{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
.hist-week-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.hist-reset-info{font-family:var(--mono);font-size:8px;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);padding:2px 8px;border-radius:8px;}
.hist-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.hist-stat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
.hist-stat-n{font-family:var(--display);font-size:20px;font-weight:700;line-height:1;}
.hist-stat-n.total{color:var(--accent);}
.hist-stat-n.win{color:var(--green);}
.hist-stat-n.loss{color:var(--red);}
.hist-stat-n.pct{color:var(--gold);}
.hist-stat-l{font-family:var(--mono);font-size:7px;color:var(--text3);letter-spacing:1.5px;margin-top:4px;}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;}
.empty-icon{font-size:42px;opacity:0.25;}
.empty-text{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:2px;}

.settings-section{margin-bottom:20px;}
.settings-title{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;padding-left:2px;}
.setting-row{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.setting-label{font-family:var(--ui);font-size:13px;color:var(--text);font-weight:600;}
.setting-sub{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:2px;}
.toggle{width:42px;height:24px;border-radius:12px;background:var(--bg3);border:1px solid var(--border2);position:relative;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.toggle.on{background:rgba(0,255,136,0.2);border-color:var(--green);}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:var(--text3);top:2px;left:2px;transition:all 0.2s;}
.toggle.on::after{background:var(--green);left:20px;box-shadow:0 0 8px var(--green);}
.channel-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;}
.channel-name{font-family:var(--display);font-size:12px;font-weight:700;color:var(--green);letter-spacing:1px;margin-bottom:6px;}
.channel-id{font-family:var(--mono);font-size:10px;color:var(--text3);}

.bottom-nav{height:60px;background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-shrink:0;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);transition:all 0.2s;}
.nav-item.active{color:var(--green);}
.nav-icon{font-size:18px;}
.nav-label{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;}

.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:2px;}
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:rotate 0.7s linear infinite;}
@keyframes rotate{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--green);color:var(--green);font-family:var(--mono);font-size:11px;letter-spacing:1px;padding:8px 18px;border-radius:20px;z-index:1000;opacity:0;transition:all 0.3s;white-space:nowrap;box-shadow:0 0 20px rgba(0,255,136,0.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">TRADE<span>SIG</span></div>
  <div class="live-badge">
    <div class="live-dot" id="liveDot"></div>
    <span class="live-text" id="liveText">LIVE</span>
  </div>
  <div class="sound-btn active" id="soundBtn">🔊</div>
  <div class="settings-btn" id="settingsBtn">⚙️</div>
</div>

<div class="refresh-bar">
  <div class="refresh-progress" id="refreshBar"></div>
</div>

<div class="tabs" id="channelTabs">
  <div class="tab active" id="tab0">
    <span class="tab-name"><span class="live-pulse"></span>LIVE</span>
    <span class="tab-count" id="cnt0">—</span>
  </div>
  <div class="tab" id="tab1">
    <span class="tab-name">DAILY</span>
    <span class="tab-count" id="cnt1">—</span>
  </div>
  <div class="tab" id="tab2">
    <span class="tab-name">FVG</span>
    <span class="tab-count" id="cnt2">—</span>
  </div>
  <div class="tab" id="tab3">
    <span class="tab-name">CRT</span>
    <span class="tab-count" id="cnt3">—</span>
  </div>
</div>

<div class="content">
  <div class="page active" id="page0"></div>
  <div class="page" id="page1"></div>
  <div class="page" id="page2"></div>
  <div class="page" id="page3"></div>
  <div class="page" id="page4"></div>
  <div class="page" id="page5"></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" id="navSignals"><div class="nav-icon">📡</div><div class="nav-label">Signals</div></div>
  <div class="nav-item" id="navHistory"><div class="nav-icon">📋</div><div class="nav-label">History</div></div>
  <div class="nav-item" id="navSettings"><div class="nav-icon">⚙️</div><div class="nav-label">Settings</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ======================== CONFIGURATION =========================
const PROXY_URL = 'https://your-backend.onrender.com'; // ⚠️ REPLACE WITH YOUR ACTUAL RENDER BACKEND URL
const CHANNELS = [
  { name:'DAILY SIGNAL', chatId:'-1003823176395', short:'DAILY' },
  { name:'FVG SIGNAL',   chatId:'-1003842429805', short:'FVG' },
  { name:'CRT SIGNAL',   chatId:'-1003562279289', short:'CRT' },
];
const REFRESH_SEC = 30;

let soundOn = true;
let currentTab = 0;
let currentNav = 'signals';
let allSignals = [[], [], []];     // per channel parsed signals
let rawMessages = [[], [], []];     // per channel non-signal raw messages
let seenIds = new Set();
let refreshTimer = null;
let _uid = 0;

// ======================== SOUND (web audio) ====================
let audioCtx = null;
function playBeep() {
  if (!soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.setValueAtTime(660, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
  } catch(e) { console.warn("audio error", e); }
}

function toggleSound() {
  soundOn = !soundOn;
  const btn = document.getElementById('soundBtn');
  btn.textContent = soundOn ? '🔊' : '🔇';
  btn.classList.toggle('active', soundOn);
  const soundToggle = document.getElementById('soundToggle');
  if (soundToggle) soundToggle.classList.toggle('on', soundOn);
  showToast(soundOn ? 'SOUND ON' : 'SOUND OFF');
}

// ======================== UTILITIES ============================
function timeAgo(unixSeconds) {
  const diffMins = Math.floor((Date.now() - unixSeconds * 1000) / 60000);
  if (diffMins < 1) return 'Just now';
  if (diffMins < 60) return `${diffMins} min ago`;
  const hours = Math.floor(diffMins / 60);
  if (hours < 24) return `${hours} hr ago`;
  return `${Math.floor(hours / 24)}d ago`;
}
function fmtTime(unixSeconds) {
  return new Date(unixSeconds * 1000).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

function getWeekRange() {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const format = d => d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
  return `${format(mon)} – ${format(sun)}`;
}
function getNextSunday() {
  const now = new Date();
  const daysUntilSun = (7 - now.getDay()) % 7 || 7;
  const nextSun = new Date(now);
  nextSun.setDate(now.getDate() + daysUntilSun);
  return nextSun.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
}

// ======================== SIGNAL PARSING (advanced) ============
function parseSignal(text) {
  if (!text) return null;
  const upper = text.toUpperCase();
  let dir = null;
  if (/\b(BUY|LONG)\b/.test(upper)) dir = 'buy';
  else if (/\b(SELL|SHORT)\b/.test(upper)) dir = 'sell';
  
  let pair = null;
  const pairMatch = text.match(/\b([A-Z]{3,4}[\/\.]?[A-Z]{3,4})\b/i) || text.match(/\b([A-Z]{6})\b/);
  if (pairMatch) pair = pairMatch[1].toUpperCase().replace(/[\/\.]/g, '');
  
  const entryMatch = text.match(/(?:ENTRY|PRICE|@)\s*[:\-]?\s*([0-9]+\.?[0-9]*)/i);
  const slMatch = text.match(/(?:SL|STOP[- ]?LOSS)\s*[:\-]?\s*([0-9]+\.?[0-9]*)/i);
  const tpMatch = text.match(/(?:TP\s*[12]?|TAKE[- ]?PROFIT\s*[12]?)\s*[:\-]?\s*([0-9]+\.?[0-9]*)/i);
  const entry = entryMatch ? entryMatch[1] : null;
  const sl = slMatch ? slMatch[1] : null;
  const tp = tpMatch ? tpMatch[1] : null;
  
  let rr = null;
  if (entry && sl && tp) {
    const e = parseFloat(entry), s = parseFloat(sl), t = parseFloat(tp);
    const risk = Math.abs(e - s);
    const reward = Math.abs(t - e);
    if (risk > 0) rr = '1:' + (reward / risk).toFixed(1);
  }
  if (!dir && !pair) return null;
  return { dir, pair, entry, sl, tp, rr };
}

// ======================== RENDER COMPONENTS ====================
function renderCard(s, showChannel, histMode) {
  const id = `c_${_uid++}`;
  const emoji = s.dir === 'buy' ? '🟢' : '🔴';
  const dirLabel = s.dir === 'buy' ? 'BUY' : 'SELL';
  const newPill = s.isNew && !histMode ? '<span class="new-pill">NEW</span>' : '';
  const chBadge = showChannel && s.ch ? `<span class="ch-badge">${s.ch}</span>` : '';
  const outBadge = histMode ? '<span class="hit-badge open">OPEN</span>' : '';
  const newCls = s.isNew && !histMode ? 'new-signal' : '';
  return `<div class="sig-card ${s.dir || ''} ${newCls}" id="${id}" onclick="toggleCard('${id}')">
    <div class="card-collapsed">
      <div class="card-top">
        <div class="card-dir-pair">
          <span class="card-emoji">${emoji}</span>
          <span class="card-dir ${s.dir}">${dirLabel}</span>
          <span class="card-pair">${s.pair || '——'}</span>
        </div>
        <div class="card-right">${newPill}${chBadge}${outBadge}<span class="expand-arrow">▼</span></div>

        <div class="cpg-cell"><div class="cpg-label">SL</div><div class="cpg-val sl">${s.sl || '—'}</div></div>

        <div class="cpg-cell"><div class="cpg-label">R:R</div><div class="cpg-val rr">${s.rr || '—'}</div></div>
      </div>
      <div class="card-time-row">
        <span class="card-time-txt">🕐 <span class="rel-t" data-ts="${s.ts}">${timeAgo(s.ts)}</span> · ${fmtTime(s.ts)}</span>

      </div>

        <span class="tg-time">🕐 <span class="rel-t" data-ts="${s.ts}">${timeAgo(s.ts)}</span> · ${fmtTime(s.ts)}</span>
        ${s.rr ? `<span class="rr-pill">R:R ${s.rr}</span>` : ''}

}

function statsRow(signalsArray) {
  const buyCount = signalsArray.filter(s => s.dir === 'buy').length;
  const sellCount = signalsArray.filter(s => s.dir === 'sell').length;
  return `<div class="stats-row">
    <div class="stat"><div class="stat-n">${signalsArray.length}</div><div class="stat-l">TOTAL</div></div>
    <div class="stat"><div class="stat-n green">${buyCount}</div><div class="stat-l">BUY</div></div>
    <div class="stat"><div class="stat-n red">${sellCount}</div><div class="stat-l">SELL</div></div>
  </div>`;
}

function renderChannelPage(chIdx, signals, raws) {
  const page = document.getElementById(`page${chIdx+1}`);
  document.getElementById(`cnt${chIdx+1}`).textContent = signals.length || '0';
  let html = statsRow(signals);
  if (!signals.length && !raws.length) {
    html += `<div class="empty-state"><div class="empty-icon">📡</div><div class="empty-text">NO SIGNALS YET</div></div>`;
  } else {
    signals.forEach(s => { html += renderCard(s, false, false); });
    if (raws.length) {
      html += `<div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;margin:12px 0 8px;">// OTHER MESSAGES</div>`;
      raws.forEach(r => {
        html += `<div class="raw-card"><div class="raw-text">${r.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div><div class="raw-time">🕐 ${fmtTime(r.ts)}</div></div>`;
      });
    }
  }
  page.innerHTML = html;
}

function renderLivePage() {
  const combined = [];
  allSignals.forEach((sigs, ci) => {
    sigs.forEach(s => combined.push({ ...s, ch: CHANNELS[ci].short }));
  });
  combined.sort((a,b) => {
    if (a.isNew && !b.isNew) return -1;
    if (!a.isNew && b.isNew) return 1;
    return (b.ts || 0) - (a.ts || 0);
  });
  document.getElementById('cnt0').textContent = combined.length || '0';
  let html = statsRow(combined);
  if (!combined.length) html += `<div class="empty-state"><div class="empty-icon">📡</div><div class="empty-text">NO SIGNALS YET</div></div>`;
  else combined.forEach(s => { html += renderCard(s, true, false); });
  document.getElementById('page0').innerHTML = html;
}

function renderHistory() {
  const combined = [];
  allSignals.forEach((sigs, ci) => {
    sigs.forEach(s => combined.push({ ...s, ch: CHANNELS[ci].short }));
  });
  combined.sort((a,b) => (b.ts || 0) - (a.ts || 0));
  const winCount = 0, lossCount = 0; // future upgrade
  const winPct = combined.length ? 0 : 0;
  document.getElementById('page4').innerHTML = `
    <div class="hist-stats-header">
      <div class="hist-week-label">
        <span>// WEEK: ${getWeekRange()}</span>
        <span class="hist-reset-info">🔄 Resets ${getNextSunday()}</span>
      </div>
      <div class="hist-stats-grid">
        <div class="hist-stat"><div class="hist-stat-n total">${combined.length}</div><div class="hist-stat-l">TOTAL</div></div>
        <div class="hist-stat"><div class="hist-stat-n win">0</div><div class="hist-stat-l">WIN</div></div>
        <div class="hist-stat"><div class="hist-stat-n loss">0</div><div class="hist-stat-l">LOSS</div></div>
        <div class="hist-stat"><div class="hist-stat-n pct">0%</div><div class="hist-stat-l">WIN %</div></div>
      </div>
    </div>
    ${combined.length ? combined.map(s => renderCard(s, true, true)).join('') : '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">NO HISTORY</div></div>'}
  `;
}

function renderSettingsPage() {
  document.getElementById('page5').innerHTML = `
    <div class="settings-section">
      <div class="settings-title">// Channels</div>
      <div class="channel-card"><div class="channel-name">📡 DAILY SIGNAL</div><div class="channel-id">Chat: -1003823176395</div></div>
      <div class="channel-card"><div class="channel-name">📡 FVG SIGNAL</div><div class="channel-id">Chat: -1003842429805</div></div>
      <div class="channel-card"><div class="channel-name">📡 CRT SIGNAL</div><div class="channel-id">Chat: -1003562279289</div></div>
    </div>
    <div class="settings-section">
      <div class="settings-title">// Preferences</div>
      <div class="setting-row">
        <div><div class="setting-label">Sound Alert</div><div class="setting-sub">New signal beep</div></div>
        <div class="toggle ${soundOn ? 'on' : ''}" id="soundToggle"></div>
      </div>
      <div class="setting-row">
        <div><div class="setting-label">Auto Refresh</div><div class="setting-sub">Every ${REFRESH_SEC} seconds</div></div>
        <div class="toggle on"></div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-title">// App Info</div>
      <div class="setting-row">
        <div><div class="setting-label">Version</div><div class="setting-sub">TradeSignal v2.1</div></div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text3)">v2.1</div>
      </div>
    </div>
  `;
  const soundToggleElem = document.getElementById('soundToggle');
  if (soundToggleElem) soundToggleElem.addEventListener('click', (e) => { e.stopPropagation(); toggleSound(); });

// ======================== FETCH PROXY ==========================
async function fetchAll() {
  const dot = document.getElementById('liveDot');
  const txt = document.getElementById('liveText');
  dot.style.background = 'var(--gold)';
  dot.style.boxShadow = '0 0 6px var(--gold)';
  txt.textContent = 'SYNC';
  let newCount = 0;
  const previousSeen = new Set(seenIds);
  try {
    const response = await fetch(`${PROXY_URL}/signals`);
    const data = await response.json();
    if (!data.ok) throw new Error('Proxy error');
    data.channels.forEach((ch, idx) => {
      if (idx >= CHANNELS.length) return;
      const signals = [];
      const raws = [];
      (ch.messages || []).forEach(msgObj => {
        const msg = msgObj.message || msgObj.channel_post;
        if (!msg) return;
        const text = msg.text || msg.caption || '';
        const id = msg.message_id;
        const ts = msg.date;
        const parsed = parseSignal(text);
        const isNew = !seenIds.has(id);
        if (parsed) {
          if (isNew) newCount++;
          signals.push({ ...parsed, text, ts, id, isNew });
        } else if (text.trim()) {
          raws.push({ text, ts, id });
        }
        seenIds.add(id);
      });
      allSignals[idx] = signals;
      rawMessages[idx] = raws;
      renderChannelPage(idx, signals, raws);
    });
    renderLivePage();
    if (newCount > 0) {
      playBeep();
      showToast(`${newCount} NEW SIGNAL${newCount > 1 ? 'S' : ''}`);
    }
    renderHistory();
    dot.style.background = 'var(--green)';
    dot.style.boxShadow = '0 0 6px var(--green)';
    txt.textContent = 'LIVE';
  } catch (err) {
    console.error(err);
    dot.style.background = 'var(--red)';
    dot.style.boxShadow = '0 0 6px var(--red)';
    txt.textContent = 'ERR';
    showToast('CONNECTION ERROR');
  }
  const bar = document.getElementById('refreshBar');
  bar.style.animation = 'none';
  bar.offsetHeight;
  bar.style.animation = '';
}

// ======================== NAVIGATION & UI =======================
function switchTab(tabIdx) {
  currentTab = tabIdx;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', i === tabIdx);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page${tabIdx}`).classList.add('active');
}

function goSignals() {
  currentNav = 'signals';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('navSignals').classList.add('active');
  document.getElementById('channelTabs').style.display = 'flex';
  switchTab(currentTab);
}
function goHistory() {
  currentNav = 'history';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('navHistory').classList.add('active');
  document.getElementById('channelTabs').style.display = 'none';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page4').classList.add('active');
  renderHistory();
}
function goSettings() {
  currentNav = 'settings';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('navSettings').classList.add('active');
  document.getElementById('channelTabs').style.display = 'none';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page5').classList.add('active');
  renderSettingsPage();
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

window.toggleCard = function(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('expanded');
};

// ======================== INITIALIZE ===========================
function attachEventListeners() {
  document.getElementById('soundBtn').addEventListener('click', toggleSound);
  document.getElementById('settingsBtn').addEventListener('click', goSettings);
  document.getElementById('navSignals').addEventListener('click', goSignals);
  document.getElementById('navHistory').addEventListener('click', goHistory);
  document.getElementById('navSettings').addEventListener('click', goSettings);
  for (let i = 0; i <= 3; i++) {
    document.getElementById(`tab${i}`).addEventListener('click', () => switchTab(i));
  }
  setInterval(() => {
    document.querySelectorAll('.rel-t').forEach(el => {
      const ts = parseInt(el.getAttribute('data-ts'));
      if (ts) el.textContent = timeAgo(ts);
    });
  }, 30000);
}

function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(fetchAll, REFRESH_SEC * 1000);
}

attachEventListeners();
renderSettingsPage();
fetchAll();
startAutoRefresh();
</script>
